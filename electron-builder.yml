# Windows packaging config for PKG-01 (Phase 7 D-12/D-14).
# Portable single-file .exe (no NSIS for v1, D-12). The load-bearing requirement is asarUnpack:
# both native .node modules load via require(<absolute path>) and fs.existsSync, which cannot
# read a file trapped inside app.asar (RESEARCH Pitfall 4). The Electron-ABI rebuild is a near-no-op
# for these N-API prebuilds — asarUnpack is the real fix; the on-machine gate proves the package loads them.
appId: com.rodrigo.jedi-interviews
productName: Jedi Interviews
directories:
    output: release
    buildResources: build
files:
    - out/**/*
    - package.json
# Both native modules ship ABI-stable N-API prebuilds that load as-is under Electron 35.7.5
# (STATE 02-01 / 04-01); this machine has no MSVC, so the default electron-builder from-source
# rebuild fails. Disable it — asarUnpack (below) is the real packaging fix (RESEARCH Pitfall 4).
npmRebuild: false
asarUnpack:
    - '**/*.node'
    - '**/node_modules/uiohook-napi/**'
    - '**/node_modules/native-recorder-nodejs/**'
    - '**/node_modules/node-gyp-build/**'
win:
    icon: build/icon.ico
    target:
        - portable
portable:
    artifactName: ${productName}-${version}-portable.exe
